<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="terminalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff41;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff41;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 5px #00ff41); }
      50% { filter: brightness(1.3) drop-shadow(0 0 10px #00ff88); }
    }
    @keyframes typewriter {
      0% { width: 0; }
      100% { width: 100%; }
    }
    .cursor {
      animation: blink 1s step-end infinite;
    }
    .command {
      animation: pulse 2s infinite;
    }
    .tech-highlight {
      font-weight: bold;
    }
  </style>
  <rect width="800" height="320" rx="12" ry="12" fill="url(#terminalGradient)" />
  <rect x="2" y="2" width="796" height="316" rx="10" ry="10" fill="none" stroke="url(#greenGlow)" stroke-width="1" opacity="0.6" />
  <rect x="8" y="8" width="784" height="28" rx="6" ry="6" fill="#2d3748" />
  <circle cx="24" cy="22" r="6" fill="#ff5f57" />
  <circle cx="44" cy="22" r="6" fill="#ffbd2e" />
  <circle cx="64" cy="22" r="6" fill="#28ca42" />
  <text x="400" y="26" fill="#a0aec0" font-family="SF Mono, Monaco, Consolas, monospace" font-size="12" text-anchor="middle" font-weight="500">terminal — Freddy Machaca</text>
  <g font-family="SF Mono, Monaco, Consolas, 'Courier New', monospace" font-size="16">
    <text x="20" y="60" fill="#00ff41" class="command" filter="url(#textGlow)">➜ whoami</text>
    <text x="30" y="82" fill="#e2e8f0" opacity="0.9">Freddy Machaca - Software Engineer</text>
    <line x1="20" y1="95" x2="780" y2="95" stroke="url(#greenGlow)" stroke-width="1" opacity="0.3" />
    <text x="20" y="118" fill="#00ff41" class="command" filter="url(#textGlow)">➜ terminal stack --show</text>
    <g class="stack-item">
      <rect x="25" y="132" width="12" height="2" fill="#ff6b6b" rx="1" />
      <text x="45" y="142" fill="#ff6b6b" class="tech-highlight">Backend</text>
      <text x="130" y="142" fill="#f7fafc">Java • Spring • NodeJS • Express</text>
    </g>
    <g class="stack-item">
      <rect x="25" y="152" width="12" height="2" fill="#4ecdc4" rx="1" />
      <text x="45" y="162" fill="#4ecdc4" class="tech-highlight">Frontend</text>
      <text x="130" y="162" fill="#f7fafc">React • Angular • JavaScript</text>
    </g>
    <g class="stack-item">
      <rect x="25" y="172" width="12" height="2" fill="#45b7d1" rx="1" />
      <text x="45" y="182" fill="#45b7d1" class="tech-highlight">Mobile</text>
      <text x="130" y="182" fill="#f7fafc">React Native • Android SDK</text>
    </g>
    <g class="stack-item">
      <rect x="25" y="192" width="12" height="2" fill="#f9ca24" rx="1" />
      <text x="45" y="202" fill="#f9ca24" class="tech-highlight">Database</text>
      <text x="130" y="202" fill="#f7fafc">MySQL • PostgreSQL • MongoDB</text>
    </g>
    <g class="stack-item">
      <rect x="25" y="212" width="12" height="2" fill="#a55eea" rx="1" />
      <text x="45" y="222" fill="#a55eea" class="tech-highlight">Others</text>
      <text x="130" y="222" fill="#f7fafc">Docker • Git • Ngnix</text>
    </g>
    <g class="stack-item">
      <rect x="25" y="232" width="12" height="2" fill="#26de81" rx="1" />
      <text x="45" y="242" fill="#26de81" class="tech-highlight">OS</text>
      <text x="130" y="242" fill="#f7fafc">Linux • Arch • Fedora</text>
    </g>
    <text x="20" y="275" fill="#00ff41" class="command" filter="url(#textGlow)">➜</text>
    <text x="40" y="275" fill="#00ff41" class="cursor">_</text>
  </g>
  <g opacity="0.3">
    <circle cx="720" cy="80" r="1" fill="#00ff41">
      <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="680" cy="120" r="1" fill="#4ecdc4">
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="740" cy="180" r="1" fill="#ff6b6b">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
